name: Build OpenWrt 25.12 APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: helloworld

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libfuse-dev libncurses5-dev libncursesw5-dev \
            libssl-dev python3 python3-dev \
            python3-pyelftools \
            rsync unzip wget zstd file patch \
            xsltproc zlib1g-dev libelf-dev swig

      - name: Download and extract OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0/targets/rockchip/armv8/openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK from: $SDK_URL"
          wget -q --show-progress -O sdk.tar.zst "$SDK_URL"
          echo "Download complete: $(du -sh sdk.tar.zst)"
          echo "Extracting..."
          tar -I zstd -xf sdk.tar.zst
          rm -f sdk.tar.zst
          SDK_DIR=$(ls -d openwrt-sdk-*/ | head -1)
          echo "Found SDK dir: $SDK_DIR"
          mv "$SDK_DIR" sdk
          echo "SDK ready."

      - name: Setup feeds
        working-directory: sdk
        run: |
          echo "=== Original feeds.conf.default ==="
          cat feeds.conf.default
          
          # 添加 helloworld 本地 feed
          echo "src-link helloworld $GITHUB_WORKSPACE/helloworld" >> feeds.conf.default
          
          echo "=== Updated feeds.conf.default ==="
          cat feeds.conf.default
          
          # 更新所有 feeds（luci, packages, routing 等官方 feed + helloworld）
          ./scripts/feeds update -a 2>&1 | tail -20
          
          # 先安装所有官方 feed 包（提供 golang/host, rust/host, luci.mk 等依赖）
          ./scripts/feeds install -a 2>&1 | tail -5
          
          # 再强制安装 helloworld 包（覆盖同名包）
          ./scripts/feeds install -a -p helloworld -f 2>&1 | tail -5
          
          echo "=== Feeds directory ==="
          ls package/feeds/
          
          echo "=== Check luci feed ==="
          ls feeds/luci/ | head -5 || echo "WARNING: luci feed not found!"
          
          echo "=== Check packages feed ==="
          ls feeds/packages/ | head -5 || echo "WARNING: packages feed not found!"
          
          make defconfig 2>&1 | grep -v "^#" | head -20

      - name: Build test package (chinadns-ng)
        working-directory: sdk
        run: |
          echo "=== Trying to build chinadns-ng ==="
          make package/chinadns-ng/compile V=s 2>&1; echo "=== Exit code: $? ==="
          echo "=== Files in bin/ after build ==="
          find bin/ -type f 2>/dev/null | sort || echo "Still empty"

      - name: Build packages
        working-directory: sdk
        run: |
          # 安装 prereq（忽略 uboot 等非目标包的失败）
          echo "=== Running prereq ==="
          make prereq 2>&1 | tail -30 || true

          PACKAGES=(
            luci-app-ssr-plus
            shadowsocks-libev
            shadowsocks-rust
            shadowsocksr-libev
            v2ray-core
            v2ray-plugin
            xray-core
            xray-plugin
            hysteria
            tuic-client
            naiveproxy
            trojan
            shadow-tls
            chinadns-ng
            mosdns
            dnsproxy
            dns2socks
            ipt2socks
            microsocks
            redsocks2
            simple-obfs
            tcping
            v2raya
            lua-neturl
          )

          SUCCESS=0
          FAILED_LIST=""

          for pkg in "${PACKAGES[@]}"; do
            echo "=========================================="
            echo "Building: $pkg"
            echo "=========================================="
            if make package/${pkg}/compile V=s -j$(nproc) FORCE=1 2>&1 | tail -20; then
              echo "✅ SUCCESS: $pkg"
              SUCCESS=$((SUCCESS+1))
            else
              echo "❌ FAILED: $pkg"
              FAILED_LIST="$FAILED_LIST $pkg"
            fi
          done

          echo ""
          echo "=== Build Summary ==="
          echo "SUCCESS: $SUCCESS"
          echo "FAILED:$FAILED_LIST"
          echo "=== All output files ==="
          find bin/ -type f | sort
          echo "Total: $(find bin/ -type f | wc -l) files"

      - name: Diagnose build results
        if: always()
        working-directory: sdk
        run: |
          echo "====== FULL SDK BIN CONTENTS ======"
          find bin/ -type f 2>/dev/null | sort || echo "bin/ dir empty or missing"
          
          echo "====== CHECK FEEDS INSTALLED ======"
          ls package/feeds/ 2>/dev/null || echo "package/feeds/ missing"
          
          echo "====== CHECK LUCI FEED ======"
          ls feeds/luci/ 2>/dev/null | head -10 || echo "feeds/luci/ MISSING"
          
          echo "====== CHECK PACKAGES FEED ======"
          ls feeds/packages/ 2>/dev/null | head -10 || echo "feeds/packages/ MISSING"
          
          echo "====== GO VERSION ======"
          go version 2>/dev/null || echo "go NOT FOUND"
          which go || echo "go not in PATH"
          
          echo "====== RUST VERSION ======"
          rustc --version 2>/dev/null || echo "rustc NOT FOUND"
          
          echo "====== SDK GOLANG STAGING ======"
          ls staging_dir/host/bin/go* 2>/dev/null || echo "No go in staging_dir/host/bin/"
          
          echo "====== LAST BUILD LOG (chinadns-ng) ======"
          log_files=$(find logs/ -name "*.txt" 2>/dev/null | head -5)
          if [ -n "$log_files" ]; then
            echo "$log_files" | while read f; do
              echo "--- $f ---"
              tail -30 "$f"
            done
          else
            echo "No log files in logs/"
          fi
          
          echo "====== BUILD DIR CHECK ======"
          ls build_dir/ 2>/dev/null | head -20 || echo "build_dir/ missing"
          
          echo "====== FEEDS CONF ======"
          cat feeds.conf.default

      - name: List built packages
        run: |
          echo "=== APK packages built ==="
          find sdk/bin/ -name "*.apk" 2>/dev/null | sort
          echo "=== Total APK count ==="
          find sdk/bin/ -name "*.apk" 2>/dev/null | wc -l

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: openwrt25-aarch64-cortex-a53-packages
          path: sdk/bin/packages/**/*.apk
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt25-build-logs
          path: sdk/logs/
          if-no-files-found: ignore
