name: Build OpenWrt 25.12 APK (aarch64_cortex-a53)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build aarch64_cortex-a53 APK packages
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libfuse-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            python3-setuptools \
            rsync \
            unzip \
            wget \
            zstd \
            file \
            patch \
            time \
            xsltproc \
            zlib1g-dev \
            libelf-dev \
            swig

      - name: Download and extract OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/25.12.0/targets/rockchip/armv8/openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          SDK_ARCHIVE="openwrt-sdk.tar.zst"

          echo "Downloading SDK..."
          wget -q --show-progress -O "$SDK_ARCHIVE" "$SDK_URL"
          echo "Download complete: $(du -sh $SDK_ARCHIVE)"

          echo "Extracting SDK..."
          # 先用 zstd 解压为 tar，再用 tar 解包
          zstd -d "$SDK_ARCHIVE" -o openwrt-sdk.tar
          rm -f "$SDK_ARCHIVE"
          tar -xf openwrt-sdk.tar
          rm -f openwrt-sdk.tar

          echo "Listing extracted contents:"
          ls -la | grep openwrt-sdk

          # 找到解压出的目录并重命名
          SDK_DIR=$(ls -d openwrt-sdk-*/ 2>/dev/null | head -1)
          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: SDK directory not found after extraction!"
            ls -la
            exit 1
          fi
          echo "Found SDK directory: $SDK_DIR"
          mv "$SDK_DIR" sdk
          echo "SDK ready at: $(pwd)/sdk"

      - name: Configure feeds
        run: |
          cd sdk
          echo "src-link helloworld $GITHUB_WORKSPACE" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p helloworld

      - name: Generate default config
        run: |
          cd sdk
          make defconfig

      - name: Compile luci-app-ssr-plus
        run: |
          set -o pipefail
          cd sdk && make package/luci-app-ssr-plus/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: luci-app-ssr-plus"

      - name: Compile shadowsocksr-libev
        run: |
          set -o pipefail
          cd sdk && make package/shadowsocksr-libev/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: shadowsocksr-libev"

      - name: Compile shadowsocks-libev
        run: |
          set -o pipefail
          cd sdk && make package/shadowsocks-libev/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: shadowsocks-libev"

      - name: Compile shadowsocks-rust
        run: |
          set -o pipefail
          cd sdk && make package/shadowsocks-rust/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: shadowsocks-rust"

      - name: Compile v2ray-core
        run: |
          set -o pipefail
          cd sdk && make package/v2ray-core/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: v2ray-core"

      - name: Compile xray-core
        run: |
          set -o pipefail
          cd sdk && make package/xray-core/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: xray-core"

      - name: Compile chinadns-ng
        run: |
          set -o pipefail
          cd sdk && make package/chinadns-ng/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: chinadns-ng"

      - name: Compile hysteria
        run: |
          set -o pipefail
          cd sdk && make package/hysteria/compile V=s -j$(nproc) 2>&1 | tail -20 || echo "FAILED: hysteria"

      - name: List all compiled packages
        run: |
          echo "=== Searching for APK files ==="
          find sdk/bin/ -name "*.apk" 2>/dev/null | sort || echo "No APK files found in sdk/bin/"
          echo ""
          echo "=== Searching for IPK files ==="
          find sdk/bin/ -name "*.ipk" 2>/dev/null | sort || echo "No IPK files found"
          echo ""
          echo "=== Full sdk/bin directory structure ==="
          find sdk/bin/ -type f 2>/dev/null | head -50 || echo "sdk/bin/ is empty or does not exist"
          echo ""
          echo "=== Build staging dir ==="
          ls sdk/staging_dir/ 2>/dev/null || echo "staging_dir empty"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: openwrt25-aarch64_cortex-a53-packages
          path: |
            sdk/bin/packages/**/*.apk
            sdk/bin/packages/**/*.ipk
          if-no-files-found: warn
